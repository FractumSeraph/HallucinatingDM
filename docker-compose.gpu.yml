# NVIDIA GPU passthrough for the bundled Ollama. Requires the NVIDIA
# Container Toolkit on the host. Usage:
#   docker compose --profile ollama -f docker-compose.yml -f docker-compose.gpu.yml up -d
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
