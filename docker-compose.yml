services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./data:/data
    restart: unless-stopped

  # Optional local LLM. Enable with:  docker compose --profile ollama up
  # Skip this profile if you point LLM_BASE_URL at LM Studio, vLLM,
  # OpenRouter, OpenAI, etc.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "127.0.0.1:11434:11434" # loopback only — lets host-side dev servers reuse it
    environment:
      # Long games need a long context window; Ollama's default (4k) silently
      # truncates. Flash attention + q8 KV cache keep 32k affordable.
      OLLAMA_CONTEXT_LENGTH: 32768
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_KV_CACHE_TYPE: q8_0
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  # One-shot helper that pulls the default models into the ollama volume.
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull qwen3.6:35b-a3b && ollama pull nomic-embed-text"
    restart: "no"

volumes:
  ollama:
