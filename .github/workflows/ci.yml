name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: uv sync
      - name: Lint
        working-directory: backend
        run: uv run ruff check app tests
      - name: Test
        working-directory: backend
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Typecheck + test + build
        working-directory: frontend
        run: |
          npm run typecheck
          npm test
          npm run build
